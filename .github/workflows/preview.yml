name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    env:
      PREVIEW_DIR: preview/${{ github.event.pull_request.number }}
      PREVIEW_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/${{ github.event.pull_request.number }}/

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build preview
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/${{ env.PREVIEW_DIR }}/
        run: pnpm build

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Deploy preview to gh-pages subdirectory
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: ${{ env.PREVIEW_DIR }}
          clean: false
          single-commit: false

      - name: Post preview URL as PR comment
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ env.PREVIEW_URL }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const body = `### Preview Deployment\n\n:rocket: Preview available at: ${url}\n\n_Updated on push to \`${{ github.head_ref }}\`_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.startsWith('### Preview Deployment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deactivate-preview:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    env:
      PREVIEW_DIR: preview/${{ github.event.pull_request.number }}
      PREVIEW_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/${{ github.event.pull_request.number }}/

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Remove preview directory and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf "${{ env.PREVIEW_DIR }}"
          touch .nojekyll
          git add -A
          git diff --cached --quiet || git commit -m "chore: remove preview for PR #${{ github.event.pull_request.number }}"
          git push

      - name: Update PR comment
        uses: actions/github-script@v9
        with:
          script: |
            const body = `### Preview Deployment\n\n:warning: Preview removed because this pull request was closed.\n\n_Previous URL was: ${{ env.PREVIEW_URL }}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.startsWith('### Preview Deployment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
